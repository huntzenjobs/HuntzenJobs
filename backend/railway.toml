# Railway Configuration for HuntZen Backend
# Documentation: https://docs.railway.app/deploy/deployments#railway-toml-file

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 2
healthcheckPath = "/api/health/ping"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Auto-scaling configuration
[deploy.autoscaling]
enabled = true
minReplicas = 2
maxReplicas = 4

# Scale up when CPU > 60% for 30 seconds (more reactive)
[[deploy.autoscaling.triggers]]
type = "cpu"
threshold = 60
duration = 30

# Scale down when CPU < 30% for 300 seconds (5 minutes)
[[deploy.autoscaling.triggers]]
type = "cpu"
threshold = 30
duration = 300
scaleDown = true
