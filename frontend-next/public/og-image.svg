<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OG Image for HuntZen Jobs - 1200x630px (Facebook/LinkedIn/Twitter standard) -->

  <!-- Background Gradient -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <linearGradient id="accentGradient" x1="0" y1="0" x2="100" y2="0">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="100%" stop-color="#00C4EA"/>
    </linearGradient>
  </defs>

  <!-- Decorative Pattern -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="150" stroke="#00D9FF" stroke-width="2" fill="none"/>
    <circle cx="1100" cy="530" r="200" stroke="#00D9FF" stroke-width="2" fill="none"/>
    <circle cx="600" cy="315" r="250" stroke="#00D9FF" stroke-width="1" fill="none"/>
  </g>

  <!-- Target/Crosshair Logo (simplified) -->
  <g transform="translate(100, 80)">
    <circle cx="0" cy="0" r="50" stroke="#00D9FF" stroke-width="6" fill="none"/>
    <circle cx="0" cy="0" r="30" stroke="#00D9FF" stroke-width="4" fill="none"/>
    <circle cx="0" cy="0" r="12" fill="#00D9FF"/>
  </g>

  <!-- Main Title -->
  <text x="220" y="140" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
    HUNTZEN
  </text>
  <text x="220" y="210" font-family="Arial, sans-serif" font-size="64" font-weight="900" fill="url(#accentGradient)" letter-spacing="-1">
    JOBS
  </text>

  <!-- Tagline -->
  <text x="220" y="270" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#CCCCCC">
    Votre allié carrière au quotidien
  </text>

  <!-- Features -->
  <g transform="translate(220, 330)">
    <!-- Feature 1 -->
    <circle cx="0" cy="0" r="8" fill="#00D9FF"/>
    <text x="25" y="8" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF">
      +100 000 offres d'emploi
    </text>

    <!-- Feature 2 -->
    <circle cx="0" cy="60" r="8" fill="#00D9FF"/>
    <text x="25" y="68" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF">
      Analyse CV experte avec score ATS
    </text>

    <!-- Feature 3 -->
    <circle cx="0" cy="120" r="8" fill="#00D9FF"/>
    <text x="25" y="128" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#FFFFFF">
      Coach carrière personnel 24/7
    </text>
  </g>

  <!-- CTA Badge -->
  <rect x="220" y="520" width="280" height="60" rx="30" fill="#00D9FF"/>
  <text x="360" y="558" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#000000" text-anchor="middle">
    Commencer gratuitement
  </text>

  <!-- URL -->
  <text x="1100" y="600" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#00D9FF" text-anchor="end">
    huntzenjobs.com
  </text>
</svg>
