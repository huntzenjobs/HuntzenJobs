<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HuntZen Logo - Light Version (Cyan #00D9FF) -->
  <!-- This is a temporary placeholder - replace with your actual logo -->

  <!-- Circle Background -->
  <circle cx="100" cy="100" r="90" fill="#00D9FF" opacity="0.1"/>

  <!-- Main Icon - Target/Crosshair representing "Hunt" -->
  <circle cx="100" cy="100" r="70" stroke="#00D9FF" stroke-width="8" fill="none"/>
  <circle cx="100" cy="100" r="45" stroke="#00D9FF" stroke-width="6" fill="none"/>
  <circle cx="100" cy="100" r="20" fill="#00D9FF"/>

  <!-- Crosshair lines -->
  <line x1="100" y1="20" x2="100" y2="80" stroke="#00D9FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="120" x2="100" y2="180" stroke="#00D9FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="20" y1="100" x2="80" y2="100" stroke="#00D9FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="100" x2="180" y2="100" stroke="#00D9FF" stroke-width="6" stroke-linecap="round"/>

  <!-- Accent element - Small Z for "Zen" -->
  <path d="M 140 60 L 160 60 L 140 80 L 160 80" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
