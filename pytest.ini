[pytest]
# Pytest configuration for HuntZen JobSearch
# Sprint 6 testing requirements: >80% coverage, comprehensive testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Exclude frontend-next directory
norecursedirs = frontend-next node_modules .git __pycache__ .pytest_cache htmlcov

# Async configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers for different test types
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (database, external services)
    load: Load/performance tests (slow, resource intensive)
    slow: Slow tests (>1 second)
    e2e: End-to-end tests
    asyncio: Async tests

# Output options with coverage
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=app
    --cov=src
    --cov=main
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=json:coverage.json
    --cov-fail-under=80
    --durations=10

# Logging
log_cli = true
log_cli_level = WARNING

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
