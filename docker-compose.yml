# ============================================
# HuntZen JobSearch - Docker Compose
# Usage: docker compose up --build
# ============================================

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: huntzen-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount NEW backend structure for hot reload
      - ./backend/src:/app/src
      - ./backend/prompts:/app/prompts
      - ./backend/pyproject.toml:/app/pyproject.toml
      # Persist Marker model cache to avoid re-downloading
      - marker-cache:/home/huntzen/.cache
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # CORS - allow frontend
      - FRONTEND_URL=http://localhost:3000
      # Marker PDF configuration - use home directory for fonts/static
      - MARKER_DATA_DIR=/home/huntzen/.cache/marker
      - HF_HOME=/home/huntzen/.cache/huggingface
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 300 --timeout-graceful-shutdown 60 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 2G
    networks:
      - huntzen-network
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        # API URL for browser (not container network)
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: huntzen-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - huntzen-network
    restart: unless-stopped

networks:
  huntzen-network:
    driver: bridge

volumes:
  marker-cache:
    driver: local
